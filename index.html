<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Dark Labyrinth</title>
<meta name="monetag" content="8f063ae3b78d60e5f890d6f073f86581">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    width:100vw;
    height:100vh;
    overflow:hidden;
    font-family:'Courier New',monospace;
    color:#fff;
    touch-action:none;
}
  #wrapper {
    position: relative;

    aspect-ratio: 16 / 9;

    width: min(100vw, calc(100vh * 16 / 9));
    height: min(100vh, calc(100vw * 9 / 16));

    margin: auto;
    overflow: hidden;
}
  #gameCanvas {
  display: block;
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
}
  #minimap{position:absolute;left:0;top:0;border:1px solid rgba(255,100,0,0.45);background:#000;image-rendering:pixelated;border-radius:50%;overflow:hidden;transition:left .22s ease,top .22s ease;box-shadow:0 0 14px rgba(0,0,0,0.65);}
  #hud{position:absolute;top:10px;right:10px;text-align:right;font-size:13px;color:#f84;text-shadow:0 0 8px #f84;}
  #overlay{position:absolute;inset:0;background:rgba(0,0,0,0.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:20px;}
  #overlay h1{font-size:clamp(22px,6vw,46px);color:#f84;text-shadow:0 0 20px #f84,0 0 40px #f00;letter-spacing:4px;}
  #overlay p{font-size:clamp(12px,3vw,15px);color:#aaa;max-width:360px;line-height:1.85;}
  #overlay .sub{color:#f84;font-size:clamp(10px,2.5vw,13px);}
  .btn{background:transparent;border:1px solid #f84;color:#f84;padding:12px 32px;font-size:clamp(14px,4vw,18px);font-family:'Courier New',monospace;cursor:pointer;letter-spacing:2px;transition:all .2s;text-transform:uppercase;}
  .btn:hover,.btn:active{background:#f84;color:#000;}
  #heartbeat{position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 0px rgba(255,0,0,0);transition:box-shadow 0.08s;}
  #joystick{position:absolute;bottom:26px;left:24px;width:118px;height:118px;border-radius:50%;background:rgba(255,255,255,0.05);border:2px solid rgba(255,100,0,0.4);touch-action:none;user-select:none;-webkit-user-select:none;opacity:0.82;}
  #joyKnob{position:absolute;left:50%;top:50%;width:52px;height:52px;border-radius:50%;background:rgba(255,100,0,0.45);border:2px solid rgba(255,150,50,0.85);transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 14px rgba(255,100,0,0.5);transition:none;}
  #noise{position:absolute;inset:0;pointer-events:none;opacity:0.035;}
  #levelBanner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(20px,5vw,36px);color:#f84;text-shadow:0 0 20px #f84;letter-spacing:6px;pointer-events:none;opacity:0;transition:opacity 0.5s;}
  #ventBtn{position:absolute;left:50%;bottom:96px;transform:translateX(-50%);background:rgba(14,16,22,0.92);border:1.5px solid rgba(120,200,190,0.6);color:#8fe6da;font-family:'Courier New',monospace;font-weight:bold;letter-spacing:1px;font-size:15px;padding:12px 30px;border-radius:30px;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:none;display:none;box-shadow:0 0 16px rgba(70,165,175,0.45);z-index:6;transition:transform .1s ease;}
  #ventBtn.show{display:block;}
  #ventBtn:active{transform:translateX(-50%) scale(0.93);}
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="gameCanvas"></canvas>
  <canvas id="minimap"></canvas>
  <div id="hud">
    <div id="lvlDisplay">LEVEL 1</div>
    <div id="stepsDisplay" style="font-size:11px;color:#855;margin-top:3px;">░░░░░░░░░░</div>
  </div>
  <div id="heartbeat"></div>
  <div id="noise"><canvas id="noiseCanvas"></canvas></div>
  <div id="levelBanner">LEVEL 1</div>
  <div id="joystick"><div id="joyKnob"></div></div>
  <button id="ventBtn">ENTER VENT</button>
  <div id="overlay">
    <h1>☠ DARK LABYRINTH</h1>
    <p>Your torch reveals only what's near.<br/>The monsters <em>hear</em> your footsteps.<br/><strong style="color:#f84">Stand still — go silent.</strong><br/>Reach the <span style="color:#0f0">green exit</span> to escape.</p>
    <p class="sub">Your map only shows where you have walked.</p>
    <button class="btn" onclick="startGame()">ENTER THE DARK</button>
  </div>
</div>

// ═══ CONFIG ═══
const BASE_MAZE_SIZE   = 31;   // odd — starts big
const CELL             = 32;
const LIGHT_RADIUS     = 4.0;
const MM_DISPLAY       = 150;
const MM_RES            = 128;   // internal resolution of the circular minimap
const MONSTER_WANDER   = 1.8;
const MONSTER_CHASE    = 4.8;
const SPEED_PER_LEVEL  = 0.18;  // each level multiplies monster speed by (1 + SPEED_PER_LEVEL*(level-1))
// monster speed multiplier — grows with level so it keeps getting faster
function monsterSpeedMul(){ return 1 + SPEED_PER_LEVEL*(level-1); }
const MONSTER_SIGHT    = 7.0;  // hunts you on sight within this range (needs a clear line of sight)
const PROX_MAX_DIST    = 22;   // cells before sound fades to 0
const LOOP_EXTRA_WALLS = 0.18; // fraction of dead-end walls to remove (adds loops)
const SCARE_COOLDOWN   = 3.0;  // seconds the scare sound stays silent after losing sight
const SCARE_DIST       = 3.0;  // monster must be within this many cells to trigger the scream (closer than the torch edge)
const NUM_VENTS        = 5;    // vents per level (connected hide + travel network)

// ═══ GLOBALS ═══
const canvas  = document.getElementById('gameCanvas');
canvas.width = 1280; 
canvas.height = 720;
const ctx     = canvas.getContext('2d');
const mmCvs   = document.getElementById('minimap');
const mmCtx   = mmCvs.getContext('2d');
const overlay = document.getElementById('overlay');
const hb      = document.getElementById('heartbeat');
const banner  = document.getElementById('levelBanner');
const wrap     = document.getElementById('wrapper');

// Touch detection — used to show an on-screen vent button instead of relying on keys
const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints>0;
const ventBtn = document.getElementById('ventBtn');
ventBtn.addEventListener('click',e=>{ e.preventDefault(); e.stopPropagation(); ensureAudio(); tryToggleVent(); });

let maze,mazeW,mazeH,player,monsters=[],level=1,visited;
let gameRunning=false,lastTime=0,keys={},touchDir=null,touchVec=null;
let monsterProximity=0,monsterStepTimer=0,playerMoving=false;
let deathAnimTimer=0,isDead=false,isWon=false,hbTimer=0;
let reviveInvincibleTimer=0, reviveFreezeTimer=0, reviveInProgress=false;
let vents=[],inVent=false,ventMenuOpen=false,currentVentIndex=-1,ventSel=0,ventInputTimer=0;

// Sprite images
const playerImg  = new Image();
const monsterImg = new Image();
const exitDoorImg = new Image();
playerImg.src  = 'data:image/png;base64,' + PLAYER_B64;
monsterImg.src = 'data:image/png;base64,' + MONSTER_B64;
exitDoorImg.src = 'data:image/png;base64,' + EXIT_DOOR_B64;

// Scare audio element
const scareAudio = new Audio('data:audio/mp3;base64,' + SCARE_B64);
scareAudio.volume = 0.9;

// ═══ WEB AUDIO ═══
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio(){
  if(!audioCtx) audioCtx = new AudioCtx();
  if(audioCtx.state==='suspended') audioCtx.resume();
}
function playTone(freq,type,vol,dur,t){
  if(!audioCtx||vol<0.002) return;

  o.type=type; o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(Math.min(vol,1),t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t); o.stop(t+dur+0.05);
}

// ═══ MAZE GENERATION — Recursive Backtracker + loop punching ═══
function generateMaze(w,h){
  const grid=Array.from({length:h},()=>Array(w).fill(1));
  function carve(x,y){
    grid[y][x]=0;
    const dirs=[[0,-2],[0,2],[-2,0],[2,0]].sort(()=>Math.random()-0.5);
    for(const[dx,dy] of dirs){
      const nx=x+dx,ny=y+dy;
      if(nx>0&&nx<w-1&&ny>0&&ny<h-1&&grid[ny][nx]===1){
        grid[y+dy/2][x+dx/2]=0; carve(nx,ny);
      }
    }
  }
  carve(1,1);

  // ── Punch extra loops: remove some interior walls that border two passages ──
  // This gives multiple routes so the player isn't trapped in one corridor
  const candidates=[];
  for(let cy=1;cy<h-1;cy++){
    for(let cx=1;cx<w-1;cx++){
      if(grid[cy][cx]!==1) continue;
      // horizontal wall between two floor cells
      if(grid[cy][cx-1]===0&&grid[cy][cx+1]===0) candidates.push([cx,cy]);
      // vertical wall
      else if(grid[cy-1][cx]===0&&grid[cy+1][cx]===0) candidates.push([cx,cy]);
    }
  }
  candidates.sort(()=>Math.random()-0.5);
  const toRemove=Math.floor(candidates.length*LOOP_EXTRA_WALLS);
  for(let i=0;i<toRemove;i++) grid[candidates[i][1]][candidates[i][0]]=0;

  return grid;
}

// ═══ BFS ═══
function bfs(sx,sy,ex,ey){
  const vis=Array.from({length:mazeH},()=>Array(mazeW).fill(false));
  const prev=Array.from({length:mazeH},()=>Array(mazeW).fill(null));
  const q=[[sx,sy]]; vis[sy][sx]=true;
  while(q.length){
    const[x,y]=q.shift();
    if(x===ex&&y===ey){
      const path=[]; let cx=ex,cy=ey;
      while(prev[cy][cx]){[cx,cy]=prev[cy][cx];path.unshift([cx,cy]);}
      return path;
    }
    for(const[dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nx=x+dx,ny=y+dy;
      if(nx>=0&&nx<mazeW&&ny>=0&&ny<mazeH&&!vis[ny][nx]&&maze[ny][nx]===0){
        vis[ny][nx]=true; prev[ny][nx]=[x,y]; q.push([nx,ny]);
      }
    }
  }
  return [];
}

// ═══ LINE OF SIGHT — true if no wall blocks the straight line between two cells ═══
function lineOfSight(x0,y0,x1,y1){
  const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
  const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
  let err=dx-dy, cx=x0, cy=y0;
  while(true){
    if((cx!==x0||cy!==y0)&&(cx!==x1||cy!==y1)){ // skip the endpoints (always floor)
      if(!maze[cy]||maze[cy][cx]===1) return false;
    }
    if(cx===x1&&cy===y1) break;
    const e2=2*err;
    if(e2>-dy){ err-=dy; cx+=sx; }
    if(e2<dx){ err+=dx; cy+=sy; }
  }
  return true;
}

// ═══ INIT LEVEL ═══
function initLevel(){
  let sz=BASE_MAZE_SIZE+(level-1)*2;
  if(sz%2===0) sz++;
  mazeW=sz; mazeH=sz;
  maze=generateMaze(mazeW,mazeH);
  maze[mazeH-2][mazeW-2]=0;
  placeVents();

  player={x:1,y:1,px:1*CELL+CELL/2,py:1*CELL+CELL/2,moveTimer:0};
  placeMonsters();   // 2 at L1, 3 at L2, … (level + 1 monsters)

  visited=Array.from({length:mazeH},()=>Array(mazeW).fill(false));
  visited[1][1]=true;

  canvas.width=mazeW*CELL; canvas.height=mazeH*CELL;
  mmCvs.width=MM_RES; mmCvs.height=MM_RES;
  buildWallLayer();
  positionMinimap();

  isDead=false; isWon=false; deathAnimTimer=0;
  reviveInvincibleTimer=0; reviveFreezeTimer=0; reviveInProgress=false;
  monsterProximity=0;
  playerStepTimer=0;

  banner.textContent='LEVEL '+level;
  banner.style.opacity='1';
  setTimeout(()=>banner.style.opacity='0',1800);
  document.getElementById('lvlDisplay').textContent='LEVEL '+level;
}

// ═══ MONSTER SPAWN — count grows with level: 2 at L1, 3 at L2, … ═══
function makeMonster(x,y){
  return {x,y,px:x*CELL+CELL/2,py:y*CELL+CELL/2,
          path:[],pathTimer:0,repath:Math.random()*0.6,   // stagger so they don't repath in lockstep
          alertLevel:0,lastKnownPX:-1,lastKnownPY:-1,
          seen:false,scareReadyAt:0};
}
function placeMonsters(){
  monsters=[];
  const count=level+1;                       // 2 at L1, 3 at L2, 4 at L3 …
  const cells=[];
  for(let y=1;y<mazeH-1;y++) for(let x=1;x<mazeW-1;x++){
    if(maze[y][x]!==0) continue;
    if(Math.hypot(x-1,y-1)<mazeW*0.45) continue;   // keep them far from the player's start
    cells.push([x,y]);
  }
  cells.sort(()=>Math.random()-0.5);
  const minSep=Math.max(mazeW,mazeH)*0.22;
  for(const [x,y] of cells){
    if(monsters.length>=count) break;
    let ok=true;
    for(const m of monsters){ if(Math.hypot(m.x-x,m.y-y)<minSep){ ok=false; break; } }
    if(ok) monsters.push(makeMonster(x,y));
  }
  let guard=0;                               // fallback if the spread wasn't enough
  while(monsters.length<count && cells.length && guard<4000){
    guard++;
    const [x,y]=cells[Math.floor(Math.random()*cells.length)];
    if(!monsters.some(m=>m.x===x&&m.y===y)) monsters.push(makeMonster(x,y));
  }
}

// ═══ MONSTER AI (per monster) ═══
function updateOneMonster(dt,m){
  m.repath-=dt;
  const dist=Math.hypot(m.x-player.x,m.y-player.y);

  // While hiding in a vent the monster can't see, hear, or track you at all.
  if(inVent){
    m.alertLevel=0; m.lastKnownPX=-1; m.lastKnownPY=-1;
  } else {
    // Proximity: nearest monster wins (aggregated across all in the wrapper below)
    const prox=Math.max(0,1-dist/PROX_MAX_DIST);
    if(prox>monsterProximity) monsterProximity=prox;

    // Hearing (your footsteps) — long range while moving, tiny while standing still
    const hearingRange=playerMoving?14:1.5;
    if(dist<=hearingRange){
      m.alertLevel=1;
      m.lastKnownPX=player.x; m.lastKnownPY=player.y;
    }
    // Vision — if it can SEE you (within range, clear line of sight) it locks on and
    // keeps tracking your position in real time, even while you stand perfectly still.
    const canSee=dist<=MONSTER_SIGHT && lineOfSight(m.x,m.y,player.x,player.y);
    if(canSee){
      m.alertLevel=1;
      m.lastKnownPX=player.x; m.lastKnownPY=player.y;
    }
    // Only gives up when it reaches your last known spot, you're silent, AND it can't see you.
    if(m.alertLevel===1&&m.x===m.lastKnownPX&&m.y===m.lastKnownPY&&!playerMoving&&!canSee){
      m.alertLevel=0; m.lastKnownPX=-1; m.lastKnownPY=-1;
    }
  }

  if(m.repath<=0||m.path.length===0){
    m.repath=m.alertLevel===1?0.35:2.5;
    if(m.alertLevel===1&&m.lastKnownPX>=0){
      // Actively hunting — path to last known player position
      m.path=bfs(m.x,m.y,m.lastKnownPX,m.lastKnownPY);
    } else {
      // Pure random wander — pick a random open floor cell, no relation to player
      // Try up to 40 times to find an open cell that is at least 3 cells away from current pos
      let tx,ty,tries=0;
      do{
        tx=1+Math.floor(Math.random()*(mazeW-2));
        ty=1+Math.floor(Math.random()*(mazeH-2));
        tries++;
      } while((maze[ty][tx]!==0||Math.hypot(tx-m.x,ty-m.y)<3)&&tries<40);
      if(maze[ty][tx]===0) m.path=bfs(m.x,m.y,tx,ty);
    }
  }

  const spd=(m.alertLevel===1?MONSTER_CHASE:MONSTER_WANDER)*monsterSpeedMul();
  m.pathTimer-=dt;
  if(m.pathTimer<=0&&m.path.length>0){
    const[nx,ny]=m.path.shift();
    m.x=nx; m.y=ny;
    m.px=nx*CELL+CELL/2; m.py=ny*CELL+CELL/2;
    m.pathTimer=1/spd;
  }

  monsterStepTimer-=dt;
  if(monsterStepTimer<=0){
    monsterStepTimer=0.36/(m.alertLevel===1?2.1:1);
    playMonsterStep();
  }
}
// update every monster; proximity reflects the nearest threat
function updateMonsters(dt){
  monsterProximity=0;
  if(reviveFreezeTimer>0){
    reviveFreezeTimer-=dt;
    return;
  }
  for(const m of monsters) updateOneMonster(dt,m);
}

// ═══ PLAYER MOVEMENT ═══
// Smooth/analog movement. The player position is now moved in pixels every frame,
// so the joystick can send ANY angle instead of being snapped to 4 directions.
const PLAYER_SPEED=4.6;          // cells per second
const PLAYER_RADIUS=CELL*0.28;   // collision radius inside corridors
let playerStepTimer=0;

function isWalkableCell(cx,cy){
  return cx>=0&&cy>=0&&cx<mazeW&&cy<mazeH&&maze[cy][cx]===0;
}
function canStandAt(px,py){
  const r=PLAYER_RADIUS;
  const pts=[
    [px-r,py-r],[px+r,py-r],[px-r,py+r],[px+r,py+r],
    [px,py-r],[px,py+r],[px-r,py],[px+r,py]
  ];
  for(const [x,y] of pts){
    if(!isWalkableCell(Math.floor(x/CELL),Math.floor(y/CELL))) return false;
  }
  return true;
}
function syncPlayerCell(){
  const cx=Math.floor(player.px/CELL), cy=Math.floor(player.py/CELL);
  if(isWalkableCell(cx,cy)){
    player.x=cx; player.y=cy;
    visited[cy][cx]=true;
  }
}
function analogVectorFromInput(){
  let vx=0,vy=0;
  if(keys['ArrowUp']||keys['w']||keys['W']) vy-=1;
  if(keys['ArrowDown']||keys['s']||keys['S']) vy+=1;
  if(keys['ArrowLeft']||keys['a']||keys['A']) vx-=1;
  if(keys['ArrowRight']||keys['d']||keys['D']) vx+=1;

  // Joystick vector has priority because it carries analog angle + strength.
  if(touchVec){ vx=touchVec.x; vy=touchVec.y; }
  // Fallback for quick swipe controls, which are still discrete by nature.
  else if(touchDir){
    if(touchDir==='up') vy=-1;
    else if(touchDir==='down') vy=1;
    else if(touchDir==='left') vx=-1;
    else if(touchDir==='right') vx=1;
  }

  const len=Math.hypot(vx,vy);
  if(len>1){ vx/=len; vy/=len; } // keyboard diagonals should not be faster
  return {vx,vy,len:Math.min(len,1)};
}
function tryMoveSmooth(vx,vy,dt,strength=1){
  const step=PLAYER_SPEED*CELL*dt*strength;
  let moved=false;

  // Resolve per axis so sliding along walls feels natural instead of sticky.
  let nx=player.px+vx*step;
  if(canStandAt(nx,player.py)){ player.px=nx; moved=Math.abs(vx)>0; }
  let ny=player.py+vy*step;
  if(canStandAt(player.px,ny)){ player.py=ny; moved=moved||Math.abs(vy)>0; }

  if(moved){
    syncPlayerCell();
    playerStepTimer-=dt;
    if(playerStepTimer<=0){ playerStepTimer=0.22; playPlayerStep(); }
  }
  return moved;
}
function handleInput(dt){
  if(isDead||isWon) return;
  if(inVent){ playerMoving=false; handleVentInput(dt); return; }
  playerMoving=false;
  const {vx,vy,len}=analogVectorFromInput();
  if(len>0.001) playerMoving=tryMoveSmooth(vx,vy,dt,len);
}

// ═══ TEXTURED WALL LAYER — pre-rendered once per level ═══
let wallLayer=null;
function buildWallLayer(){
  wallLayer=document.createElement('canvas');
  wallLayer.width=canvas.width;
  wallLayer.height=canvas.height;
  const w=wallLayer.getContext('2d');
  // floor base (same dark color as before)
  w.fillStyle='#07070b';
  w.fillRect(0,0,wallLayer.width,wallLayer.height);
  for(let cy=0;cy<mazeH;cy++){
    for(let cx=0;cx<mazeW;cx++){
      if(maze[cy][cx]!==1) continue;
      drawStoneBlock(w,cx*CELL,cy*CELL);
    }
  }
}
function drawStoneBlock(c,x,y){
  // varied grey base so neighbouring blocks differ slightly
  const base=88+(Math.random()*34|0);            // 88..121
  const tint=(Math.random()*6|0);
  c.fillStyle=`rgb(${base},${base},${base+4+tint})`;
  c.fillRect(x,y,CELL,CELL);
  // rough speckle noise — dark pits + light flecks
  for(let i=0;i<70;i++){
    const sx=x+Math.random()*CELL, sy=y+Math.random()*CELL;
    const s=1+(Math.random()*2|0);
    if(Math.random()<0.55) c.fillStyle=`rgba(0,0,0,${0.05+Math.random()*0.18})`;
    else                   c.fillStyle=`rgba(255,255,255,${0.03+Math.random()*0.09})`;
    c.fillRect(sx,sy,s,s);
  }
  // a few darker blotches for depth / staining
  for(let i=0;i<4;i++){
    c.fillStyle=`rgba(0,0,0,${0.10+Math.random()*0.14})`;
    const r=2+(Math.random()*4|0);
    c.beginPath(); c.arc(x+Math.random()*CELL,y+Math.random()*CELL,r,0,Math.PI*2); c.fill();
  }
  // raised-block bevel: light top/left, dark bottom/right
  c.fillStyle='rgba(255,255,255,0.12)';
  c.fillRect(x,y,CELL,2);
  c.fillRect(x,y,2,CELL);
  c.fillStyle='rgba(0,0,0,0.34)';
  c.fillRect(x,y+CELL-2,CELL,2);
  c.fillRect(x+CELL-2,y,2,CELL);
  // occasional crack running across the stone
  if(Math.random()<0.22){
    c.strokeStyle=`rgba(0,0,0,${0.25+Math.random()*0.2})`;
    c.lineWidth=1;
    c.beginPath();
    let px=x+3+Math.random()*(CELL-6), py=y+3+Math.random()*(CELL-6);
    c.moveTo(px,py);
    const segs=2+(Math.random()*3|0);
    for(let s=0;s<segs;s++){ px+=(Math.random()-0.5)*10; py+=(Math.random()-0.5)*10; c.lineTo(px,py); }
    c.stroke();
  }
}

// ═══ VENTS (Among-Us style hide + travel network) ═══
function placeVents(){
  vents=[];
  const cells=[];
  for(let y=1;y<mazeH-1;y++) for(let x=1;x<mazeW-1;x++){
    if(maze[y][x]!==0) continue;
    if(Math.hypot(x-1,y-1)<4) continue;                                  // not near start
    if(Math.hypot(x-(mazeW-2),y-(mazeH-2))<4) continue;                  // not near exit
    cells.push([x,y]);
  }
  cells.sort(()=>Math.random()-0.5);
  const minDist=Math.max(mazeW,mazeH)*0.32;
  for(const [x,y] of cells){
    if(vents.length>=NUM_VENTS) break;
    let ok=true;
    for(const v of vents){ if(Math.hypot(v.x-x,v.y-y)<minDist){ ok=false; break; } }
    if(ok) vents.push({x,y});
  }
  let guard=0;
  while(vents.length<NUM_VENTS && cells.length && guard<2000){
    guard++;
    const [x,y]=cells[Math.floor(Math.random()*cells.length)];
    if(!vents.some(v=>v.x===x&&v.y===y)) vents.push({x,y});
  }
}
function tryToggleVent(){
  if(isDead||isWon) return;
  if(inVent){ emerge(); return; }                                  // E while inside = exit here
  const idx=vents.findIndex(v=>v.x===player.x&&v.y===player.y);
  if(idx>=0) enterVent(idx);
}
function enterVent(idx){
  inVent=true; ventMenuOpen=true; currentVentIndex=idx;
  ventSel=(idx+1)%vents.length;                                    // default to another vent
  // hiding breaks the trail of EVERY monster — vents are a safe escape
  for(const m of monsters){
    m.alertLevel=0; m.lastKnownPX=-1; m.lastKnownPY=-1; m.path=[]; m.repath=0;
    m.seen=false;
  }
  monsterProximity=0;
}
function travelToVent(destIdx){
  const v=vents[destIdx];
  player.x=v.x; player.y=v.y;
  player.px=v.x*CELL+CELL/2; player.py=v.y*CELL+CELL/2;
  visited[v.y][v.x]=true;
  emerge();
}
function confirmVentSelection(){
  if(ventSel===currentVentIndex){ emerge(); return; }
  travelToVent(ventSel);
}
function emerge(){ inVent=false; ventMenuOpen=false; currentVentIndex=-1; }
function handleVentInput(dt){
  ventInputTimer-=dt;
  if(ventInputTimer>0) return;
  let dir=0;
  if(keys['ArrowUp']||keys['w']||keys['W']||touchDir==='up') dir=-1;
  else if(keys['ArrowDown']||keys['s']||keys['S']||touchDir==='down') dir=1;
  if(dir!==0){ ventSel=(ventSel+dir+vents.length)%vents.length; ventInputTimer=0.18; }
}
function roundRect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y);
  c.arcTo(x+w,y,x+w,y+h,r);
  c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r);
  c.arcTo(x,y,x+w,y,r);
  c.closePath();
}
function drawVent(c,x,y){
  const m=3;
  c.save();
  // soft teal glow so vents are discoverable in the torch light
  const g=c.createRadialGradient(x+CELL/2,y+CELL/2,1,x+CELL/2,y+CELL/2,CELL*0.85);
  g.addColorStop(0,'rgba(70,165,175,0.20)'); g.addColorStop(1,'rgba(70,165,175,0)');
  c.fillStyle=g; c.fillRect(x-CELL/2,y-CELL/2,CELL*2,CELL*2);
  // metal frame with bevel
  c.fillStyle='#33343b'; c.fillRect(x+m,y+m,CELL-2*m,CELL-2*m);
  c.fillStyle='rgba(255,255,255,0.13)';
  c.fillRect(x+m,y+m,CELL-2*m,1); c.fillRect(x+m,y+m,1,CELL-2*m);
  c.fillStyle='rgba(0,0,0,0.45)';
  c.fillRect(x+m,y+CELL-m-1,CELL-2*m,1); c.fillRect(x+CELL-m-1,y+m,1,CELL-2*m);
  // horizontal slats (the grate)
  c.fillStyle='#0d0e11';
  for(let sy=y+m+3; sy<y+CELL-m-3; sy+=5) c.fillRect(x+m+3,sy,CELL-2*m-6,3);
  c.restore();
}
function drawVentMenu(){
  const lineH=Math.round(CELL*0.95);

    ctx.fillText((i+1)+'.  Vent '+String.fromCharCode(65+i)+(isCur?'   ◂ you are here':''), px+26, rowY+lineH*0.66);
  });

}
function drawVentPrompt(){
  if(isTouch) return;                          // touch devices use the on-screen button instead
  if(inVent||isDead||isWon) return;
  const idx=vents.findIndex(v=>v.x===player.x&&v.y===player.y);

  const label='Press  E  to enter Vent '+String.fromCharCode(65+idx);
  ctx.save();
  ctx.font='bold '+Math.round(CELL*0.5)+'px Courier New';
  const tw=ctx.measureText(label).width;
  const padX=Math.round(CELL*0.5), bh=Math.round(CELL*0.92);
  const bw=tw+padX*2;
  const bx=(canvas.width-bw)/2, by=canvas.height-bh-Math.round(CELL*0.7);
  // background pill
  ctx.fillStyle='rgba(0,0,0,0.62)';

  ctx.lineWidth=1.5; ctx.strokeStyle='rgba(120,200,190,0.55)'; ctx.stroke();
  // gently pulsing text so it catches the eye
  const pulse=0.65+0.35*Math.sin(Date.now()/260);
  ctx.globalAlpha=0.65+0.35*pulse;
  ctx.fillStyle='#8fe6da';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowBlur=8; ctx.shadowColor='rgba(70,165,175,0.9)';
  ctx.fillText(label,canvas.width/2,by+bh/2);
  ctx.restore();
}
// Show / hide + relabel the on-screen vent button for touch devices
function updateVentButton(){
  if(!isTouch||!gameRunning){ ventBtn.classList.remove('show'); return; }
  if(isDead||isWon){ ventBtn.classList.remove('show'); return; }
  if(inVent){ ventBtn.textContent='EXIT VENT'; ventBtn.classList.add('show'); return; }
  if(vents.some(v=>v.x===player.x&&v.y===player.y)){ ventBtn.textContent='ENTER VENT'; ventBtn.classList.add('show'); }
  else ventBtn.classList.remove('show');
}

// ═══ DRAW GAME ═══
function drawGame(){
  const vW=canvas.width,vH=canvas.height;
  ctx.clearRect(0,0,vW,vH);

  // Pre-rendered textured walls + floor
  ctx.drawImage(wallLayer,0,0);

  // Exit door with green glow
  const ex=mazeW-2,ey=mazeH-2;
  const exitX=ex*CELL+CELL/2, exitY=ey*CELL+CELL/2;
  const eg=ctx.createRadialGradient(exitX,exitY,1,exitX,exitY,CELL*2.55);
  eg.addColorStop(0,'rgba(0,255,70,0.58)');
  eg.addColorStop(0.45,'rgba(0,255,70,0.25)');
  eg.addColorStop(1,'rgba(0,255,70,0)');
  ctx.fillStyle=eg;
  ctx.fillRect((ex-2)*CELL,(ey-2)*CELL,CELL*5,CELL*5);
  ctx.save();
  ctx.shadowBlur=22;
  ctx.shadowColor='rgba(0,255,70,0.95)';
  const ds=CELL*1.22;
  ctx.drawImage(exitDoorImg,exitX-ds/2,exitY-ds/2,ds,ds);
  ctx.restore();

  // Vents
  for(const v of vents) drawVent(ctx,v.x*CELL,v.y*CELL);

  // Monster sprite — visible ONLY when within torch range AND there's a clear
  // line of sight to it. Walls block vision, so the monster is hidden behind walls.
  const ppx=player.px,ppy=player.py;
  const nowSec=performance.now()/1000;
  let anyVisible=false;
  for(const m of monsters){
    const d=Math.hypot(m.x-player.x,m.y-player.y);
    const nv = !inVent && d<LIGHT_RADIUS+0.9
            && lineOfSight(player.x,player.y,m.x,m.y);
    // Scare voice: fires the instant you gain line of sight on a monster.
    // Per-monster cooldown so a newly-spotted one still screams.
    if(nv){
      anyVisible=true;
      if(!m.seen && nowSec>=m.scareReadyAt && (scareAudio.paused||scareAudio.ended)){
        scareAudio.currentTime=0;
        scareAudio.play().catch(()=>{});
      }
    } else if(m.seen){
      m.scareReadyAt=nowSec+SCARE_COOLDOWN;
    }
    m.seen=nv;
    if(!nv) continue;
    const alpha=Math.min(1,(LIGHT_RADIUS+0.9-d)/LIGHT_RADIUS);
    const mx=m.px,my=m.py;
    ctx.save();
    ctx.globalAlpha=alpha;
    // Red aura
    const mg=ctx.createRadialGradient(mx,my,2,mx,my,CELL*1.1);
    mg.addColorStop(0,'rgba(180,0,20,0.6)'); mg.addColorStop(1,'rgba(80,0,10,0)');
    ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(mx,my,CELL*1.1,0,Math.PI*2); ctx.fill();
    // Sprite (white icon on black bg)
    const sz=CELL*1.1;
    ctx.globalCompositeOperation='screen';
    ctx.globalAlpha=alpha*0.85;
    ctx.drawImage(monsterImg,mx-sz/2,my-sz/2,sz,sz);
    ctx.restore();
  }
  // cut the scream once no monster is in sight
  if(!anyVisible){ scareAudio.pause(); scareAudio.currentTime=0; }
  // Fog of war
  const fog=ctx.createRadialGradient(ppx,ppy,0,ppx,ppy,LIGHT_RADIUS*CELL);
  fog.addColorStop(0,'rgba(0,0,0,0)');
  fog.addColorStop(0.5,'rgba(0,0,0,0)');
  fog.addColorStop(0.72,'rgba(0,0,0,0.68)');
  fog.addColorStop(1,'rgba(0,0,0,1)');
  ctx.fillStyle=fog; ctx.fillRect(0,0,vW,vH);

  // Torch warm tint
  const tg=ctx.createRadialGradient(ppx,ppy,0,ppx,ppy,CELL*LIGHT_RADIUS);
  tg.addColorStop(0,'rgba(255,150,30,0.15)');
  tg.addColorStop(0.55,'rgba(255,100,10,0.05)');
  tg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=tg; ctx.fillRect(0,0,vW,vH);

  // Player sprite (hidden while inside a vent)
  if(!inVent){
  ctx.save();
  ctx.shadowBlur=22; ctx.shadowColor='#ffaa22';
  const ps=CELL*0.9;
  ctx.drawImage(playerImg,ppx-ps/2,ppy-ps/2,ps,ps);
  // torch flicker glow
  ctx.globalAlpha=0.35+0.12*Math.sin(Date.now()/110);
  const fg2=ctx.createRadialGradient(ppx,ppy,0,ppx,ppy,CELL*0.85);
  fg2.addColorStop(0,'rgba(255,200,80,0.35)'); fg2.addColorStop(1,'rgba(255,150,30,0)');
  ctx.fillStyle=fg2; ctx.beginPath(); ctx.arc(ppx,ppy,CELL*0.85,0,Math.PI*2); ctx.fill();
  ctx.restore();
  }

  // Revive protection glow
  if(reviveInvincibleTimer>0&&!isDead&&!inVent){
    ctx.save();
    const pulse=0.55+0.45*Math.sin(Date.now()/95);
    ctx.globalAlpha=0.38+0.22*pulse;
    ctx.strokeStyle='#00ff66';
    ctx.lineWidth=3;
    ctx.shadowBlur=18;
    ctx.shadowColor='#00ff66';
    ctx.beginPath();
    ctx.arc(ppx,ppy,CELL*(0.74+0.10*pulse),0,Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  // Death
  if(isDead){
    ctx.fillStyle=`rgba(150,0,0,${Math.min(0.88,deathAnimTimer)})`;
    ctx.fillRect(0,0,vW,vH);
    ctx.save();
    ctx.font=`bold ${Math.round(CELL*1.3)}px Courier New`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#fff'; ctx.shadowBlur=14; ctx.shadowColor='#f00';
    ctx.fillText('☠',ppx,ppy);
    ctx.restore();
  }
  if(isWon){
    ctx.fillStyle=`rgba(0,20,0,${Math.min(0.75,deathAnimTimer)})`;
    ctx.fillRect(0,0,vW,vH);
  }
  if(ventMenuOpen) drawVentMenu();
  else drawVentPrompt();
}

// ═══ MINIMAP — circular, only visited path shown ═══
function drawMinimap(){
  const R=MM_RES/2;
  mmCtx.fillStyle='#000';
  mmCtx.fillRect(0,0,MM_RES,MM_RES);
  // fit the square grid inside the circle so even the corner exit stays visible
  const fs=0.94*R*Math.SQRT2/Math.max(mazeW,mazeH);
  const gx=mazeW/2, gy=mazeH/2;
  const sz=Math.max(1,fs*1.4);
  for(let cy=0;cy<mazeH;cy++){
    for(let cx=0;cx<mazeW;cx++){
      if(!visited[cy][cx]) continue;
      mmCtx.fillStyle='#7a5530';
      mmCtx.fillRect(R+fs*(cx-gx),R+fs*(cy-gy),sz,sz);
    }
  }
  // Vent markers with letter labels (only ones you've discovered)
  mmCtx.textAlign='center'; mmCtx.textBaseline='middle';
  const ventFont=Math.max(8,Math.round(sz*2.6));
  vents.forEach((v,i)=>{
    if(!visited[v.y][v.x]) return;
    const vxp=R+fs*(v.x-gx), vyp=R+fs*(v.y-gy);
    const here=inVent&&currentVentIndex===i;
    // labeled dot
    mmCtx.fillStyle=here?'#ffaa22':'#3f7d99';
    mmCtx.beginPath(); mmCtx.arc(vxp,vyp,Math.max(4,sz*1.7),0,Math.PI*2); mmCtx.fill();
    mmCtx.fillStyle=here?'#000':'#eafcff';
    mmCtx.font='bold '+ventFont+'px Courier New';
    mmCtx.fillText(String.fromCharCode(65+i),vxp,vyp);
  });
  // Exit dot
  mmCtx.fillStyle='#00ff55';
  mmCtx.fillRect(R+fs*((mazeW-2)-gx),R+fs*((mazeH-2)-gy),sz+1,sz+1);
  // Player dot
  mmCtx.fillStyle='#ffcc44';
  mmCtx.fillRect(R+fs*(player.x-gx),R+fs*(player.y-gy),sz+1,sz+1);
}

// ═══ POSITION MINIMAP — parks in the corner farthest from the player,
// but NEVER the bottom-left (that corner is reserved for the joystick) ═══
let mmCorner='tr';   // sticky so the map doesn't jitter between corners
function positionMinimap(){
  const r=wrap.getBoundingClientRect();
  const ws=r.width;
  const hs=r.height;
  if(!ws) return;
  const mmSize=Math.max(92,Math.min(MM_DISPLAY,ws*0.26));
  mmCvs.style.width=mmSize+'px';
  mmCvs.style.height=mmSize+'px';
  const margin=10;
  const corners={
  tl:{
    cx:margin+mmSize/2,
    cy:margin+mmSize/2,
    left:margin,
    top:margin
  },
  tr:{
    cx:ws-margin-mmSize/2,
    cy:margin+mmSize/2,
    left:ws-mmSize-margin,
    top:margin
  },
  br:{
    cx:ws-margin-mmSize/2,
    cy:hs-margin-mmSize/2,
    left:ws-mmSize-margin,
    top:hs-mmSize-margin
  }
};
  const scaleX = ws / canvas.width;
  const scaleY = hs / canvas.height;
  const sx = player.px * scaleX;
  const sy = player.py * scaleY;
  let best=mmCorner, bestD=Math.hypot(corners[mmCorner].cx-sx,corners[mmCorner].cy-sy);
  for(const key in corners){
    const c=corners[key];
    const d=Math.hypot(c.cx-sx,c.cy-sy);
    if(d>bestD+ws*0.15){ bestD=d; best=key; }
  }
  mmCorner=best;
  const c=corners[mmCorner];
  mmCvs.style.left=c.left+'px';
  mmCvs.style.top=c.top+'px';
}

// ═══ HORROR EFFECTS ═══
function updateHorrorEffects(dt){
  const p=monsterProximity;
  if(p>0.08){
    const pulse=0.5+0.5*Math.sin(Date.now()/170*(1+p*3));
    hb.style.boxShadow=`inset 0 0 ${68*p}px rgba(255,0,0,${0.55*p*pulse})`;
    hbTimer-=dt;
    if(hbTimer<=0){hbTimer=Math.max(0.20,1.05-p*0.92);playHeartbeat(p);}
  } else {
    hb.style.boxShadow='none'; hbTimer=0;
  }
  const bars=10, filled=Math.round(p*bars);
  const meter='▓'.repeat(filled)+'░'.repeat(bars-filled);
  const el=document.getElementById('stepsDisplay');
  el.textContent=meter;
  el.style.color=`rgb(${Math.round(80+175*p)},${Math.round(85-85*p)},${Math.round(84-84*p)})`;
}

// ═══ COLLISION ═══
function checkEvents(){
  if(isDead||isWon||inVent) return;
  if(reviveInvincibleTimer<=0 && monsters.some(m=>m.x===player.x&&m.y===player.y)){
    isDead=true; playScream();
    setTimeout(showGameOver,1900);
  }
  if(player.x===mazeW-2&&player.y===mazeH-2){
    isWon=true; playWin();
    setTimeout(()=>{level++;initLevel();},2100);
  }
}

// ═══ MAIN LOOP ═══
function loop(ts){
  if(!gameRunning) return;
  const dt=Math.min((ts-lastTime)/1000,0.1);
  lastTime=ts;
  if(reviveInvincibleTimer>0) reviveInvincibleTimer=Math.max(0,reviveInvincibleTimer-dt);
  if(!isDead&&!isWon){handleInput(dt);updateMonsters(dt);checkEvents();}
  else deathAnimTimer+=dt*1.3;
  updateHorrorEffects(dt);
  drawGame();
  drawMinimap();
  positionMinimap();
  updateVentButton();
  requestAnimationFrame(loop);
}
function resizeGame() {
    const wrapper = document.getElementById("wrapper");
    const canvas = document.getElementById("gameCanvas");
    const aspect = 16 / 9;
    let width = window.innerWidth;
    let height = window.innerHeight;
    if (width / height > aspect) {
        width = height * aspect;
    } else {
        height = width / aspect;
    }
    wrapper.style.width = width + "px";
    wrapper.style.height = height + "px";
    canvas.width = width;
    canvas.height = height;
    console.log(
    window.innerWidth,
    window.innerHeight
    );
}
  
async function startGame() {
    const isPhone =
        /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    if (isPhone) {
        try {
            const element = document.documentElement;
            if (element.requestFullscreen) {
                await element.requestFullscreen();
            }
            if (
                screen.orientation &&
                screen.orientation.lock
            ) {
               await screen.orientation.lock("landscape");
               await new Promise(resolve => {
                    let done = false;

                    const finish = () => {
                       if(done) return;
                       done = true;
                       resolve();
                    };
                    window.addEventListener("resize", finish, { once:true });
                    setTimeout(finish, 1000);
                });
                resizeGame();
            }
        } catch (e) {
            console.log(e);
        }
    }
    await new Promise(resolve => setTimeout(resolve, 700));
    resizeGame();
    setTimeout(resizeGame, 1000);
    setTimeout(resizeGame, 1500);
    ensureAudio();
    level = 1;
    overlay.style.display = "none";
    initLevel();
    gameRunning = true;
    lastTime = performance.now();
    requestAnimationFrame(loop);
}
function showGameOver(){
  if(!isDead) return;
  reviveInProgress=false;
  overlay.innerHTML=`
    <h1>☠ YOU DIED</h1>
    <p>It found you in the dark.<br/>Watch an ad to revive exactly where you fell.</p>
    <p class="sub">Reached Level ${level}</p>
    <button id="reviveBtn" class="btn" onclick="watchAdToRevive()">WATCH AD TO REVIVE</button>
    <button class="btn" onclick="restartGame()">TRY AGAIN</button>
    <p id="adStatus" class="sub" style="min-height:18px;color:#aaa"></p>`;
  overlay.style.display='flex';
}

function showRewardedAdForRevive(){
  try {
    window.open('https://omg10.com/4/11221132', '_blank');
        return Promise.resolve();
  } catch (e) {
    return Promise.reject(new Error('Popup blocked! Please allow popups to revive.'));
  }
}

function watchAdToRevive(){
  if(!isDead||reviveInProgress) return;
  ensureAudio();
  const btn=document.getElementById('reviveBtn');
  const status=document.getElementById('adStatus');
  reviveInProgress=true;
  if(btn){ btn.disabled=true; btn.textContent='LOADING AD...'; }
  if(status) status.textContent='Please watch the full ad to revive.';
  showRewardedAdForRevive().then(()=>{
    revivePlayer();
  }).catch(err=>{
    reviveInProgress=false;
    if(btn){ btn.disabled=false; btn.textContent='WATCH AD TO REVIVE'; }
    if(status) status.textContent=(err&&err.message)?err.message:'Ad was not completed. Revive unavailable.';
  });
}

function moveMonstersAwayFromPlayer(){
  const cells=[];
  const minDist=Math.max(7,Math.floor(Math.max(mazeW,mazeH)*0.35));
  for(let y=1;y<mazeH-1;y++) for(let x=1;x<mazeW-1;x++){
    if(maze[y][x]!==0) continue;
    if(x===player.x&&y===player.y) continue;
    if(Math.hypot(x-player.x,y-player.y)<minDist) continue;
    cells.push([x,y]);
  }
  cells.sort(()=>Math.random()-0.5);
  for(let i=0;i<monsters.length;i++){
    const pick=cells[i%cells.length]||[mazeW-2,mazeH-2];
    const [x,y]=pick;
    const m=monsters[i];
    m.x=x; m.y=y; m.px=x*CELL+CELL/2; m.py=y*CELL+CELL/2;
    m.path=[]; m.pathTimer=0; m.repath=1.2+Math.random()*1.2;
    m.alertLevel=0; m.lastKnownPX=-1; m.lastKnownPY=-1;
    m.seen=false; m.scareReadyAt=performance.now()/1000+SCARE_COOLDOWN;
  }
}

function revivePlayer(){
  isDead=false; isWon=false; deathAnimTimer=0; reviveInProgress=false;
  reviveInvincibleTimer=3.0;
  reviveFreezeTimer=1.2;
  monsterProximity=0;
  moveMonstersAwayFromPlayer();
  overlay.style.display='none';
  if(scareAudio){ scareAudio.pause(); scareAudio.currentTime=0; }
  lastTime=performance.now();
}

function restartGame(){
  ensureAudio(); level=1;
  reviveInvincibleTimer=0; reviveFreezeTimer=0; reviveInProgress=false;
  overlay.style.display='none';
  initLevel(); lastTime=performance.now();
}

// ═══ INPUT ═══
window.addEventListener('keydown',e=>{
  const k=e.key;
  keys[k]=true; ensureAudio();
  if(ventMenuOpen){
    if(k>='1'&&k<='9'){ const i=parseInt(k,10)-1; if(i<vents.length) travelToVent(i); e.preventDefault(); return; }
    if(k==='Enter'||k===' '){ confirmVentSelection(); e.preventDefault(); return; }
    if(k==='Escape'||k==='q'||k==='Q'){ emerge(); e.preventDefault(); return; }
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','W','s','S','a','A','d','D'].includes(k)){ e.preventDefault(); return; }
  }
  if(k==='e'||k==='E'){ tryToggleVent(); e.preventDefault(); return; }
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(k)) e.preventDefault();
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

// ═══ JOYSTICK (mobile) ═══
const joy=document.getElementById('joystick');
const joyKnob=document.getElementById('joyKnob');
let joyActive=false, joyCX=0, joyCY=0;
const JOY_DEAD=10;   // dead-zone radius (px) before movement registers
function joyUpdate(clientX,clientY){
  const r=joy.getBoundingClientRect();
  const radius=r.width/2;
  joyCX=r.left+radius; joyCY=r.top+radius;
  let rawDx=clientX-joyCX, rawDy=clientY-joyCY;
  let len=Math.hypot(rawDx,rawDy);
  const max=radius-26;                       // keep knob inside the ring

  let dx=rawDx, dy=rawDy;
  if(len>max){ dx=rawDx/len*max; dy=rawDy/len*max; len=max; }
  joyKnob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;

  if(len<JOY_DEAD){ touchVec=null; touchDir=null; return; }

  // Analog vector: preserves the exact joystick angle (0..360°) and pressure.
  const strength=Math.min(1,(len-JOY_DEAD)/(max-JOY_DEAD));
  const nx=dx/Math.hypot(dx,dy), ny=dy/Math.hypot(dx,dy);
  touchVec={x:nx*strength,y:ny*strength};

  // Keep a cardinal helper only for vent-menu navigation / legacy swipe logic.
  if(Math.abs(dx)>Math.abs(dy)) touchDir=dx>0?'right':'left';
  else touchDir=dy>0?'down':'up';
}
function joyReset(){ touchVec=null; touchDir=null; joyKnob.style.transform='translate(-50%,-50%)'; }
joy.addEventListener('touchstart',e=>{e.preventDefault();ensureAudio();joyActive=true;const t=e.touches[0];joyUpdate(t.clientX,t.clientY);},{passive:false});
joy.addEventListener('touchmove',e=>{e.preventDefault();if(joyActive){const t=e.touches[0];joyUpdate(t.clientX,t.clientY);}},{passive:false});
joy.addEventListener('touchend',e=>{e.preventDefault();joyActive=false;joyReset();},{passive:false});
joy.addEventListener('touchcancel',()=>{joyActive=false;joyReset();});
// mouse support (desktop testing)
joy.addEventListener('mousedown',e=>{ensureAudio();joyActive=true;joyUpdate(e.clientX,e.clientY);});
window.addEventListener('mousemove',e=>{if(joyActive)joyUpdate(e.clientX,e.clientY);});
window.addEventListener('mouseup',()=>{if(joyActive){joyActive=false;joyReset();}});

let swipeStart=null;
window.addEventListener('touchstart',e=>{
  if(e.target.id==='joystick'||e.target.id==='joyKnob'||e.target.id==='ventBtn') return;
  swipeStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
},{passive:true});
window.addEventListener('touchend',e=>{
  if(!swipeStart) return;
  const dx=e.changedTouches[0].clientX-swipeStart.x;
  const dy=e.changedTouches[0].clientY-swipeStart.y;
  swipeStart=null;
  if(Math.abs(dx)<12&&Math.abs(dy)<12){ if(ventMenuOpen) confirmVentSelection(); return; }
  ensureAudio();
  if(Math.abs(dx)>Math.abs(dy)) touchDir=dx>0?'right':'left';
  else touchDir=dy>0?'down':'up';
  setTimeout(()=>touchDir=null,200);
},{passive:true});

// ═══ FILM GRAIN ═══
const nc=document.getElementById('noiseCanvas');
nc.width=600; nc.height=600;
nc.style.width='100%'; nc.style.height='100%';
function drawNoise(){
  const nc2d=nc.getContext('2d');
  const img=nc2d.createImageData(nc.width,nc.height);
  const d=img.data;
  for(let i=0;i<d.length;i+=4){const v=Math.random()*255|0;d[i]=d[i+1]=d[i+2]=v;d[i+3]=15;}
  nc2d.putImageData(img,0,0);
}
setInterval(drawNoise,80);

});
